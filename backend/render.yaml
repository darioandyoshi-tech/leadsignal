services:
  - type: web
    name: leadsignal-api
    runtime: python
    plan: starter
    buildCommand: |
      pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: GOOGLE_PLACES_API_KEY
        sync: false
      - key: ALPACA_BASE_URL
        sync: false
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        sync: false
      - key: ALPACA_AUTO_TRADE
        sync: false
      - key: ALPACA_MAX_OPEN_POSITIONS
        sync: false
      - key: ALPACA_CAPITAL_PER_TRADE
        sync: false
      - key: ALPACA_MAX_HOLD_DAYS
        sync: false
      - key: AGENTMAIL_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: leadsignal-postgres
          property: connectionString
      - key: SYNC_DATABASE_URL
        fromDatabase:
          name: leadsignal-postgres
          property: connectionString

databases:
  - name: leadsignal-postgres
    plan: free
    databaseName: leadsignal
    user: leadsignal
    ipAllowList: []
